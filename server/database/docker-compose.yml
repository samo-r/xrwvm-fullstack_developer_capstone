version: "3.9"

services:
  # Mongodb service
  mongo_db:
    container_name: db_container
    image: mongo:latest
    ports:
      - 27017:27017
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # Node api service
  api:
    image: nodeapp
    ports:
      - 3030:3030
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI_DOCKER}
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3030/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      mongo_db:
        condition: service_healthy

volumes:
  mongo_data: {}
